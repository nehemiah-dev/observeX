global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["localhost:9093"]

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "observex-app"
    static_configs:
      - targets: ["observex-app.duckdns.org:8080"]
    metrics_path: /metrics

  - job_name: "node-exporter"
    static_configs:
      - targets: ["localhost:9100", "observex.duckdns.org:9100"]

  - job_name: "pushgateway"
    honor_labels: true
    static_configs:
      - targets: ["localhost:9091"]

  # Scrapes OTel Collector's Prometheus metrics exposition endpoint
  - job_name: "otelcollector"
    static_configs:
      - targets: ["observex-app.duckdns.org:8888"]
    metrics_path: /metrics

  - job_name: "blackbox-http"
    metrics_path: /probe
    params:
      module: [http_2xx]
    static_configs:
      - targets: 
          - https://observex-app.duckdns.org
          - https://observex-app.duckdns.org/healthz
          - https://observex-app.duckdns.org/error
          - https://observex-app.duckdns.org/slow
          - https://observex-app.duckdns.org/item/1
          - https://observex-app.duckdns.org/item/995
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: localhost:9115
